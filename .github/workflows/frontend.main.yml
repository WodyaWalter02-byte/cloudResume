name: deploy_frontend

on:
    push:
        branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: azure/CLI@v1
      with:
        azcliversion: 2.0.72
        inlineScript: |
           az storage blob upload-batch --account-name wodyaresume02 --auth-mode key -d '$web' -s . --connection-string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" --overwrite
